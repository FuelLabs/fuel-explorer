query statistics {
  statistics {
    nodes {
      totalTps {
        date
        value
      }
      averageTps {
        date
        value
      }
      maxTps {
        date
        value
      }
      averageTpsPerMinute {
        date
        value
      }
      rollingAverageTps
      rollingStats60s {
        tps
        avgTxPerBlock
        avgGasPerBlock
        avgBlockSize
        peakTps
      }
      totalGasUsed {
        date
        value
      }
      averageGasUsed {
        date
        value
      }
      maxGasUsed {
        date
        value
      }
      totalFee {
        date
        value
        valueInUsd
      }
      totalFee24hrs
    }
  }
}
